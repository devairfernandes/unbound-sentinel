# Kickstart file for Rocky Linux 9.7 (RHEL 9) - 100% Offline Unbound Sentinel Automated Installation
text
harddrive --partition=sr0 --dir=/Minimal

keyboard --vckeymap=br --xlayouts='br'
lang pt_BR.UTF-8
timezone America/Sao_Paulo --utc

network --bootproto=dhcp --device=link --activate
rootpw --plaintext admin123

firewall --disabled
selinux --disabled

bootloader --location=mbr
zerombr
clearpart --all --initlabel
autopart --type=lvm

reboot

%packages --ignoremissing
@core
tar
firewalld
protobuf-c
unbound-libs
nano
bind-utils
%end

%post --nochroot --log=/mnt/sysimage/root/ks-post-nochroot.log
# Copy the Extras folder from the media to the installed system's /mnt/sysimage/tmp/
echo "=== Copying Extras folder in nochroot phase ==="
mkdir -p /mnt/sysimage/tmp/Extras
cp -r /run/install/repo/Extras/* /mnt/sysimage/tmp/Extras/
echo "=== Copying completed successfully ==="
%end

%post --log=/root/ks-post.log
set -x
echo "=== Starting Offline Post-Install Configuration ==="

# Verifica se os Extras foram copiados
if [ ! -d /tmp/Extras ]; then
    echo "ERRO: /tmp/Extras nao encontrado! O nochroot falhou."
    exit 1
fi

cd /tmp/Extras
ls -la

# 1. Install Redis, Unbound, and Bind Utilities (dig) from the local folder
echo "Installing local RPMs..."
dnf --disablerepo=* localinstall -y --skip-broken *.rpm || \
    rpm -ivh --nodeps --force *.rpm || \
    echo "AVISO: Falha ao instalar alguns RPMs, continuando..."

# 2. Extract Node.js v20 to /opt/node
echo "Extracting Node.js..."
mkdir -p /opt/node
tar -xf node-v20.18.0-linux-x64.tar.xz -C /opt/node --strip-components=1

# Create global symlinks
ln -sf /opt/node/bin/node /usr/bin/node
ln -sf /opt/node/bin/npm /usr/bin/npm
ln -sf /opt/node/bin/npx /usr/bin/npx

# 3. Extract Unbound Sentinel Dashboard to /opt/unbound-dashboard
echo "Extracting Unbound Sentinel Dashboard..."
mkdir -p /opt/unbound-dashboard
tar -xzf unbound-sentinel.tar.gz -C /opt/unbound-dashboard

# Copy GeoIP databases to /opt/unbound-dashboard/
echo "Copying GeoIP databases..."
cp GeoLite2-City.mmdb /opt/unbound-dashboard/GeoLite2-City.mmdb
cp GeoLite2-Country.mmdb /opt/unbound-dashboard/GeoLite2-Country.mmdb

# Copy .env config if .env does not exist
if [ ! -f "/opt/unbound-dashboard/.env" ]; then
    cp /opt/unbound-dashboard/.env.example /opt/unbound-dashboard/.env
    # Replace default ports and configuration
    sed -i 's/PORT=.*/PORT=3300/' /opt/unbound-dashboard/.env
    sed -i 's/DASH_PASS=.*/DASH_PASS=admin123/' /opt/unbound-dashboard/.env
    # Explicitly default to standard client/monitor mode
    echo "IS_MASTER=false" >> /opt/unbound-dashboard/.env
    echo "SENTINEL_LICENSE_KEY=FREE" >> /opt/unbound-dashboard/.env
fi

# 4. Generate Unbound keys and certificates using unbound-control-setup
echo "Setting up Unbound certificates..."
unbound-control-setup

# 5. Apply sentinel optimizations to /etc/unbound/unbound.conf
echo "Configuring unbound.conf with optimization and extended stats..."
# Backup original unbound.conf
cp /etc/unbound/unbound.conf /etc/unbound/unbound.conf.bak || true

# Touch logfile and set ownership
touch /var/log/unbound.log
chown unbound:unbound /var/log/unbound.log

# Initialize root key for DNSSEC validation offline
unbound-anchor -a "/var/lib/unbound/root.key" 2>/dev/null || true
chown unbound:unbound /var/lib/unbound/root.key
chmod 644 /var/lib/unbound/root.key

# Copy pre-bundled root.zone file for RFC 7706 Hyperlocal
echo "Setting up root.zone for Hyperlocal DNS..."
cp /tmp/Extras/root.zone /var/lib/unbound/root.zone
chown unbound:unbound /var/lib/unbound/root.zone
chmod 644 /var/lib/unbound/root.zone

# --- DYNAMIC ISP OPTIMIZATION SETUP ---
# Detect hardware resources and apply optimal high-performance ISP tuning
CORES=$(nproc)
TOTAL_MEM_KB=$(grep MemTotal /proc/meminfo | awk '{print $2}')
TOTAL_MEM_GB=$((TOTAL_MEM_KB / 1024 / 1024))

SLABS=4
if [ "$CORES" -le 2 ]; then
    SLABS=2
elif [ "$CORES" -le 4 ]; then
    SLABS=4
elif [ "$CORES" -le 8 ]; then
    SLABS=8
else
    SLABS=16
fi

if [ "$TOTAL_MEM_GB" -ge 16 ]; then
    RRSET_CACHE="4g"
    MSG_CACHE="2g"
    KEY_CACHE="1g"
    NEG_CACHE="256m"
    RCV_BUF="16m"
    SND_BUF="16m"
    INFRA_HOSTS="200000"
elif [ "$TOTAL_MEM_GB" -ge 8 ]; then
    RRSET_CACHE="2g"
    MSG_CACHE="1g"
    KEY_CACHE="512m"
    NEG_CACHE="128m"
    RCV_BUF="12m"
    SND_BUF="12m"
    INFRA_HOSTS="100000"
else
    # Safe defaults for 4GB or less (scaled up from standard defaults)
    RRSET_CACHE="1g"
    MSG_CACHE="512m"
    KEY_CACHE="256m"
    NEG_CACHE="64m"
    RCV_BUF="8m"
    SND_BUF="8m"
    INFRA_HOSTS="50000"
fi

# ISP-Grade Rate Limiting (Prevent flood but allow high concurrent traffic)
RATE_LIMIT="5000"
IP_RATE_LIMIT="1000"

echo "Applying dynamically calculated ISP tuning parameters..."

# Generate a clean, dynamically performance-optimized, anti-DDoS unbound.conf
cat << EOF > /etc/unbound/unbound.conf
server:
    # General Settings
    verbosity: 1
    interface: 0.0.0.0
    port: 53
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes
    chroot: ""
    
    # DNSSEC Validation
    auto-trust-anchor-file: "/var/lib/unbound/root.key"
    
    # Logging Configuration
    use-syslog: no
    logfile: "/var/log/unbound.log"
    log-queries: yes

    # Access Control (Allow queries from local and private networks)
    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow
    access-control: 0.0.0.0/0 allow

    # High-Performance Threading and Slabs (Tuned dynamically for this hardware)
    num-threads: $CORES
    msg-cache-slabs: $SLABS
    rrset-cache-slabs: $SLABS
    infra-cache-slabs: $SLABS
    key-cache-slabs: $SLABS
    infra-cache-numhosts: $INFRA_HOSTS
    
    # Massive Network Buffers (prevent UDP packet loss under high load)
    so-rcvbuf: $RCV_BUF
    so-sndbuf: $SND_BUF
    so-reuseport: yes

    # Huge Cache Tuning for ISPs
    rrset-cache-size: $RRSET_CACHE
    msg-cache-size: $MSG_CACHE
    key-cache-size: $KEY_CACHE
    neg-cache-size: $NEG_CACHE
    
    # TTL, Prefetching & Serve Expired (RFC 8767) (Keep hot entries always fresh)
    cache-min-ttl: 300
    cache-max-ttl: 86400
    prefetch: yes
    prefetch-key: yes
    serve-expired: yes
    serve-expired-ttl: 86400
    
    # ISP Load Balancing & Bandwidth Minimization
    rrset-roundrobin: yes
    minimal-responses: yes
    fast-server-num: 3
    
    # Advanced DDoS & Amplification Mitigation
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    qname-minimisation: yes
    harden-short-bufsize: yes
    harden-large-queries: yes
    edns-buffer-size: 1232
    
    # ISP-Grade Rate Limiting
    ratelimit: $RATE_LIMIT
    ip-ratelimit: $IP_RATE_LIMIT
    
    # Extended Statistics for Sentinel Dashboard
    statistics-interval: 0
    statistics-cumulative: no
    extended-statistics: yes

# Remote Control Configuration for Sentinel Dashboard
remote-control:
    control-enable: yes
    control-interface: 127.0.0.1
    control-port: 953
    server-key-file: "/etc/unbound/unbound_server.key"
    server-cert-file: "/etc/unbound/unbound_server.pem"
    control-key-file: "/etc/unbound/unbound_control.key"
    control-cert-file: "/etc/unbound/unbound_control.pem"

# RFC 7706 Hyperlocal Root Zone configuration
auth-zone:
    name: "."
    primary: 192.0.32.9             # A.ROOT-SERVERS.NET
    primary: 192.5.5.241            # F.ROOT-SERVERS.NET
    primary: 192.112.36.4           # G.ROOT-SERVERS.NET
    primary: 193.0.14.129           # K.ROOT-SERVERS.NET
    primary: 192.0.47.132           # L.ROOT-SERVERS.NET
    primary: 2001:500:2f::f         # F.ROOT-SERVERS.NET (IPv6)
    primary: 2001:500:12::d0d       # G.ROOT-SERVERS.NET (IPv6)
    primary: 2001:7fd::1            # K.ROOT-SERVERS.NET (IPv6)
    primary: 2001:500:9f::42        # L.ROOT-SERVERS.NET (IPv6)
    fallback-enabled: yes
    for-downstream: no
    for-upstream: yes
    zonefile: "/var/lib/unbound/root.zone"
EOF


# 6. Setup Systemd Service for Unbound Sentinel Dashboard
echo "Setting up Unbound Sentinel Dashboard systemd service..."
cat << 'EOF' > /etc/systemd/system/unbound-dashboard.service
[Unit]
Description=Unbound Sentinel Dashboard
After=network.target

[Service]
Type=simple
User=root
WorkingDirectory=/opt/unbound-dashboard
ExecStart=/usr/bin/node /opt/unbound-dashboard/index.js
Restart=on-failure
RestartSec=5
StandardOutput=journal
StandardError=journal
SyslogIdentifier=unbound-dashboard
Environment=NODE_ENV=production

[Install]
WantedBy=multi-user.target
EOF

# 7. Enable services on boot
echo "Enabling services..."
systemctl daemon-reload

# Habilita redis e unbound apenas se estiverem instalados
if systemctl list-unit-files | grep -q 'redis.service'; then
    systemctl enable redis.service
    echo "Redis habilitado."
else
    echo "AVISO: redis.service nao encontrado, pulando..."
fi

if systemctl list-unit-files | grep -q 'unbound.service'; then
    systemctl enable unbound.service
    echo "Unbound habilitado."
else
    echo "AVISO: unbound.service nao encontrado, pulando..."
fi

systemctl enable unbound-dashboard.service
echo "unbound-dashboard habilitado com sucesso."

# 7b. Setup Systemd Service Override for Unbound Cache Persistence
echo "Setting up Unbound cache persistence systemd override..."
mkdir -p /etc/systemd/system/unbound.service.d
cat << 'EOF' > /etc/systemd/system/unbound.service.d/override.conf
[Service]
ExecStartPost=/bin/sh -c 'sleep 2 && [ -f /var/lib/unbound/unbound_cache.db ] && /usr/sbin/unbound-control load_cache < /var/lib/unbound/unbound_cache.db || true'
ExecStop=/bin/sh -c '/usr/sbin/unbound-control dump_cache > /var/lib/unbound/unbound_cache.db || true'
EOF
systemctl daemon-reload
echo "Unbound cache persistence systemd override configured."

# 8. Configure Firewall (liberar portas 53/udp/tcp, 3300/tcp e 51386/tcp para SSH)
echo "Configuring firewall rules..."
mkdir -p /etc/firewalld/zones
cat << 'EOF' > /etc/firewalld/zones/public.xml
<?xml version="1.0" encoding="utf-8"?>
<zone>
  <short>Public</short>
  <description>For use in public areas. You do not trust the other computers on networks to not harm your computer. Only selected incoming connections are accepted.</description>
  <service name="dhcpv6-client"/>
  <service name="dns"/>
  <port port="3300" protocol="tcp"/>
  <port port="51386" protocol="tcp"/>
</zone>
EOF
chmod 640 /etc/firewalld/zones/public.xml
chown root:root /etc/firewalld/zones/public.xml
echo "Firewall public.xml configured."

# 8b. Liberar SSH root login e alterar porta para 51386
echo "Configurando SSH (Porta 51386 e Root Login)..."
# Alterar/adicionar a porta SSH
sed -i 's/^#Port.*/Port 51386/' /etc/ssh/sshd_config
sed -i 's/^Port.*/Port 51386/' /etc/ssh/sshd_config
grep -q 'Port 51386' /etc/ssh/sshd_config || echo 'Port 51386' >> /etc/ssh/sshd_config

# Configurar permissões de root e senha
sed -i 's/^#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
sed -i 's/^PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
grep -q 'PermitRootLogin' /etc/ssh/sshd_config || echo 'PermitRootLogin yes' >> /etc/ssh/sshd_config
sed -i 's/^#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
sed -i 's/^PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
grep -q 'PasswordAuthentication' /etc/ssh/sshd_config || echo 'PasswordAuthentication yes' >> /etc/ssh/sshd_config
echo "SSH configurado com sucesso na porta 51386."

# 9. Custom Banner/MOTD for Console and SSH Login
echo "Configuring MOTD..."
cat << 'EOF' > /tmp/motd_temp
\033[1;36m╔══════════════════════════════════════════════════════════════════════╗\033[0m
║  \033[1;32m_    _ _   _ ____   ____  _    _ _   _ _____  \033[0m                        ║
║ \033[1;32m| |  | | \\ | |  _ \\ / __ \\| |  | | \\ | |  __ \\ \033[0m                        ║
║ \033[1;32m| |  | |  \\| | |_) | |  | | |  | |  \\| | |  | |\033[0m                        ║
║ \033[1;32m| |  | | . \` |  _ <| |  | | |  | | . \` | |  | |\033[0m                        ║
║ \033[1;32m| |__| | |\\  | |_) | |__| | |__| | |\\  | |__| |\033[0m                        ║
║ \033[1;32m \\____/|_| \\_|____/ \\____/ \\____/|_| \\_|_____/ \033[0m                        ║
║  \033[1;36m _____ ______ _   _ _______ _____ _   _ ______ _      \033[0m               ║
║ \033[1;36m  / ____|  ____| \\ | |__   __|_   _| \\ | |  ____| |     \033[0m               ║
║ \033[1;36m | (___ | |__  |  \\| |  | |    | | |  \\| | |__  | |     \033[0m               ║
║ \033[1;36m  \\___ \\|  __| | . \` |  | |    | | | . \` |  __| | |     \033[0m               ║
║ \033[1;36m  ____) | |____| |\\  |  | |   _| |_| |\\  | |____| |____ \033[0m               ║
║ \033[1;36m |_____/|______|_| \\_|  |_|  |_____|_| \\_|______|______|\033[0m               ║
\033[1;36m╠══════════════════════════════════════════════════════════════════════╣\033[0m
║\033[1;37m                       CONFIGURAÇÃO DO APPLIANCE                        \033[0m║
\033[1;36m╠══════════════════════════════════════════════════════════════════════╣\033[0m
║                                                                      ║
║  \033[1;33m» Painel Web:\033[0m       \033[1;32mhttp://<YOUR_IP>:3300\033[0m                        ║
║  \033[1;33m» Login Padrão:\003[0m     \033[1;37madmin / admin123\033[0m                                ║
║                                                                      ║
║  \033[1;33m» Acesso SSH:\003[0m       \033[1;37mssh root@<YOUR_IP> -p 51386\033[0m                  ║
║  \033[1;33m» Porta Unbound:\003[0m    \033[1;32m53 (DNS Otimizado & Anti-DDoS)\033[0m                  ║
║  \033[1;33m» Validar DNSSEC:\003[0m   \033[1;32mATIVO (100% Criptográfico)\033[0m                      ║
║                                                                      ║
║  \033[1;33m» Arquivo Env:\003[0m      \033[1;37m/opt/unbound-dashboard/.env\033[0m                      ║
║  \033[1;33m» Status Dashboard:\003[0m \033[1;37msystemctl status unbound-dashboard\033[0m             ║
║                                                                      ║
\033[1;36m╚══════════════════════════════════════════════════════════════════════╝\033[0m
EOF
echo -e "$(cat /tmp/motd_temp)" > /etc/motd
cp /etc/motd /etc/issue
rm -f /tmp/motd_temp

# 9b. Lock resolv.conf to 127.0.0.1 (NetworkManager DNS Management Disabled)
echo "Locking resolv.conf to localhost (127.0.0.1)..."
mkdir -p /etc/NetworkManager/conf.d
cat << 'EOF' > /etc/NetworkManager/conf.d/90-dns-none.conf
[main]
dns=none
EOF

# Make sure NetworkManager reloads config if it is running (though system will reboot)
systemctl reload NetworkManager 2>/dev/null || true

# Force write nameserver 127.0.0.1
cat << 'EOF' > /etc/resolv.conf
# Generated for Unbound Sentinel DNS Appliance
nameserver 127.0.0.1
options timeout:1 attempts:5
EOF

# Make resolv.conf immutable to guarantee no tool or DHCP client can overwrite it
chattr +i /etc/resolv.conf
echo "resolv.conf successfully locked."

# 9c. Install Interactive First-Boot Network Configuration Wizard
echo "Installing first-boot Network Configuration Wizard..."
cp /tmp/Extras/firstboot-network.sh /root/firstboot-network.sh
chmod +x /root/firstboot-network.sh

# Append first-boot execution logic to root's bashrc
cat << 'EOF' >> /root/.bashrc

# Unbound Sentinel First-Boot Network Wizard Hook
if [ -f "/root/firstboot-network.sh" ] && [ ! -f "/root/.firstboot_done" ]; then
    # Only run in an interactive shell and on an active TTY/SSH terminal
    if [ -t 0 ] && [ -n "$PS1" ]; then
        /root/firstboot-network.sh
    fi
fi
EOF

# 10. Clean up temporary files
echo "Cleaning up..."
rm -rf /tmp/Extras

echo "=== Offline Post-Install Completed successfully ==="
%end
