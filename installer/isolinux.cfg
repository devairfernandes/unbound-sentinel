default vesamenu.c32
timeout 600

display boot.msg

# Clear the screen when exiting the menu
menu clear
menu background splash.png
menu title Unbound Sentinel - DNS Security Platform v2.5.15
menu vshift 26
menu rows 10
menu margin 12
#menu hidden
menu helpmsgrow 15
menu tabmsgrow 13

# Border Area - transparent
menu color border * #00000000 #00000000 none

# Selected item - bright cyan text, dark translucent bg
menu color sel 0 #ff00e5ff #1a002233 none

# Title bar - bright cyan
menu color title 0 #ff00e5ff #00000000 none

# Press [Tab] message - dim cyan
menu color tabmsg 0 #7f00b8cc #00000000 none

# Unselected menu item - soft cyan/teal
menu color unsel 0 #ff00a8b8 #00000000 none

# Selected hotkey
menu color hotsel 0 #ff00e5ff #00000000 none

# Unselected hotkey - white
menu color hotkey 0 #ffffffff #00000000 none

# Help text
menu color help 0 #ffccddee #00000000 none

# Scrollbar
menu color scrollbar 0 #ff00e5ff #1a003344 none

# Timeout msg - cyan
menu color timeout 0 #ff00e5ff #00000000 none
menu color timeout_msg 0 #ff00a8b8 #00000000 none

# Command prompt text
menu color cmdmark 0 #ff00e5ff #00000000 none
menu color cmdline 0 #ffffffff #00000000 none

menu tabmsg Pressione Tab para opcoes de configuracao avancadas.

menu separator # insert an empty line

label linux
  menu label ^Instalar Unbound Sentinel DNS - Automatico
  menu default
  kernel vmlinuz
  append initrd=initrd.img inst.stage2=hd:LABEL=Rocky-9-7-x86_64-dvd inst.ks=hd:LABEL=Rocky-9-7-x86_64-dvd:/ks.cfg quiet

label check
  menu label ^Verificar midia e instalar Unbound Sentinel DNS
  kernel vmlinuz
  append initrd=initrd.img inst.stage2=hd:LABEL=Rocky-9-7-x86_64-dvd rd.live.check quiet

menu separator # insert an empty line

# utilities submenu
menu begin ^Solucao de Problemas
  menu title Solucao de Problemas - Unbound Sentinel

label text
  menu indent count 5
  menu label Instalar em ^modo texto (sem graficos)
  text help
	Use esta opcao se estiver com problemas na
	instalacao grafica do Unbound Sentinel.
  endtext
  kernel vmlinuz
  append initrd=initrd.img inst.stage2=hd:LABEL=Rocky-9-7-x86_64-dvd inst.ks=hd:LABEL=Rocky-9-7-x86_64-dvd:/ks.cfg inst.text quiet

label rescue
  menu indent count 5
  menu label ^Recuperar sistema instalado
  text help
	Se o sistema nao inicializar, acesse os arquivos
	e configuracoes para tentar recupera-lo.
  endtext
  kernel vmlinuz
  append initrd=initrd.img inst.stage2=hd:LABEL=Rocky-9-7-x86_64-dvd inst.rescue quiet

label memtest
  menu label ^Teste de memoria RAM
  text help
	Teste a memoria RAM do sistema para verificar
	problemas de hardware antes da instalacao.
  endtext
  kernel memtest

menu separator # insert an empty line

label local
  menu label Inicializar pelo ^disco local
  localboot 0xffff

menu separator # insert an empty line

label returntomain
  menu label Voltar ao ^menu principal
  menu exit

menu end
