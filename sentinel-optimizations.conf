server:
    # Protecao contra ataques de inundacao (Flooding) e amplificacao DNS
    # 3000 qps e seguro para provedores com CGNAT. Use 0 para desativar.
    ratelimit: 3000

    # Seguranca: garantir que apenas redes privadas e localhost podem resolver.
    # Remove acesso publico (open resolver) mesmo que unbound.conf principal tenha 0.0.0.0/0.
    # Redes permitidas: localhost, LAN privada (RFC1918) e CGNAT (RFC6598)
    access-control: 0.0.0.0/0 refuse
    access-control: ::/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow
    access-control: 100.64.0.0/10 allow
    access-control: ::1 allow
    access-control: fe80::/10 allow
