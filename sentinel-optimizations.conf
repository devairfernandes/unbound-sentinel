server:
    # --- PRIVACIDADE ---
    qname-minimization: yes
    
    # --- PERFORMANCE ---
    prefetch: yes
    prefetch-key: yes
    
    # --- RESILIÊNCIA ---
    serve-expired: yes
    serve-expired-ttl: 86400
    
    # --- SEGURANÇA (HARDENING) ---
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: yes
    
    # --- OTIMIZAÇÃO DE MEMÓRIA ---
    msg-cache-slabs: 4
    rrset-cache-slabs: 4
    infra-cache-slabs: 4
    key-cache-slabs: 4
